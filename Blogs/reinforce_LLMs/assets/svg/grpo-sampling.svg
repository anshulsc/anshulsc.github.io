<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 10 5 L 0 8 z" fill="#6e46be" />
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .box { fill: #ffffff; stroke: #e0e0e0; stroke-width: 1.5; rx: 8px; filter: url(#shadow); }
    .box-accent { fill: #fcfaff; stroke: #6e46be; stroke-width: 2; rx: 8px; filter: url(#shadow); }
    .box-stats { fill: #f0f7ff; stroke: #0066cc; stroke-width: 1.5; rx: 8px; filter: url(#shadow); }
    .text-title { font-family: 'Inter', system-ui, sans-serif; font-size: 13px; font-weight: 600; fill: #111111; }
    .text-body { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #555555; }
    .text-trans { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #6e46be; font-weight: 600; }
    .line { fill: none; stroke: #6e46be; stroke-width: 1.5; marker-end: url(#arrow); }
  </style>

  <!-- Prompt Box (Top) -->
  <rect x="220" y="20" width="160" height="50" class="box-accent" />
  <text x="300" y="50" text-anchor="middle" class="text-title">Prompt (x)</text>

  <!-- Output boxes (Middle) -->
  <rect x="50" y="110" width="100" height="50" class="box" />
  <text x="100" y="130" text-anchor="middle" class="text-title">Output y₁</text>
  <text x="100" y="145" text-anchor="middle" class="text-body">reward r₁</text>

  <rect x="250" y="110" width="100" height="50" class="box" />
  <text x="300" y="130" text-anchor="middle" class="text-title">Output y₂</text>
  <text x="300" y="145" text-anchor="middle" class="text-body">reward r₂</text>

  <rect x="450" y="110" width="100" height="50" class="box" />
  <text x="500" y="130" text-anchor="middle" class="text-title">Output y_G</text>
  <text x="500" y="145" text-anchor="middle" class="text-body">reward r_G</text>

  <!-- Group Statistics Box (Bottom Centre) -->
  <rect x="180" y="210" width="240" height="60" class="box-stats" />
  <text x="300" y="235" text-anchor="middle" class="text-title" fill="#0066cc">Group Statistics</text>
  <text x="300" y="253" text-anchor="middle" class="text-body" fill="#333">Mean μ, Std Dev σ of rewards</text>

  <!-- Output Advantage boxes (Final) -->
  <text x="100" y="315" text-anchor="middle" class="text-trans">A₁ = (r₁-μ)/σ</text>
  <text x="300" y="315" text-anchor="middle" class="text-trans">A₂ = (r₂-μ)/σ</text>
  <text x="500" y="315" text-anchor="middle" class="text-trans">A_G = (r_G-μ)/σ</text>

  <!-- Connection Lines -->
  <!-- Top to Middle -->
  <path d="M 220 45 L 100 45 L 100 110" class="line" />
  <path d="M 300 70 L 300 110" class="line" />
  <path d="M 380 45 L 500 45 L 500 110" class="line" />

  <!-- Middle to Statistics -->
  <path d="M 100 160 L 100 190 L 180 230" class="line" />
  <path d="M 300 160 L 300 210" class="line" />
  <path d="M 500 160 L 500 190 L 420 230" class="line" />

  <!-- Statistics to Advantage -->
  <path d="M 210 270 L 100 270 L 100 295" class="line" />
  <path d="M 300 270 L 300 295" class="line" />
  <path d="M 390 270 L 500 270 L 500 295" class="line" />
</svg>
