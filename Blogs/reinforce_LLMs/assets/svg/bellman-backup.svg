<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .line { fill: none; stroke: #888888; stroke-width: 1.5; }
    .state-node { fill: #fcfaff; stroke: #6e46be; stroke-width: 2.5; filter: url(#shadow); }
    .action-node { fill: #333333; stroke: #333333; stroke-width: 1; }
    .text-main { font-family: 'Inter', system-ui, sans-serif; font-size: 14px; fill: #111111; font-weight: 500; }
    .text-sub { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #666666; }
    .text-formula { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; fill: #6e46be; font-weight: 600; }
  </style>

  <!-- Connectors -->
  <!-- Top state to action nodes -->
  <line x1="250" y1="50" x2="130" y2="150" class="line" />
  <line x1="250" y1="50" x2="250" y2="150" class="line" />
  <line x1="250" y1="50" x2="370" y2="150" class="line" />

  <!-- Action nodes to next state nodes -->
  <line x1="130" y1="150" x2="80" y2="270" class="line" />
  <line x1="130" y1="150" x2="180" y2="270" class="line" />

  <line x1="250" y1="150" x2="250" y2="270" class="line" />

  <line x1="370" y1="150" x2="320" y2="270" class="line" />
  <line x1="370" y1="150" x2="420" y2="270" class="line" />

  <!-- State Node s (Top) -->
  <circle cx="250" cy="50" r="16" class="state-node" />
  <text x="250" y="55" text-anchor="middle" class="text-main">s</text>

  <!-- Action Nodes (Middle) -->
  <circle cx="130" cy="150" r="6" class="action-node" />
  <circle cx="250" cy="150" r="6" class="action-node" />
  <circle cx="370" cy="150" r="6" class="action-node" />

  <!-- Next State Nodes s' (Bottom) -->
  <circle cx="80" cy="270" r="12" class="state-node" />
  <text x="80" y="274" text-anchor="middle" class="text-sub">s₁'</text>

  <circle cx="180" cy="270" r="12" class="state-node" />
  <text x="180" y="274" text-anchor="middle" class="text-sub">s₂'</text>

  <circle cx="250" cy="270" r="12" class="state-node" />
  <text x="250" y="274" text-anchor="middle" class="text-sub">s₃'</text>

  <circle cx="320" cy="270" r="12" class="state-node" />
  <text x="320" y="274" text-anchor="middle" class="text-sub">s₄'</text>

  <circle cx="420" cy="270" r="12" class="state-node" />
  <text x="420" y="274" text-anchor="middle" class="text-sub">s₅'</text>

  <!-- Text Labels -->
  <!-- Policies -->
  <text x="160" y="100" class="text-formula" text-anchor="end">π(a₁|s)</text>
  <text x="262" y="110" class="text-formula" text-anchor="start">π(a₂|s)</text>
  <text x="340" y="100" class="text-formula" text-anchor="start">π(a₃|s)</text>

  <!-- Transitions -->
  <text x="85" y="210" class="text-sub" text-anchor="end">p(s₁', r₁ | s, a₁)</text>
  <text x="190" y="210" class="text-sub" text-anchor="start">p(s₂', r₂ | s, a₁)</text>
  <text x="260" y="215" class="text-sub" text-anchor="start">p(s₃', r₃ | s, a₂)</text>
  <text x="310" y="210" class="text-sub" text-anchor="end">p(s₄', r₄ | s, a₃)</text>
  <text x="425" y="210" class="text-sub" text-anchor="start">p(s₅', r₅ | s, a₃)</text>
</svg>
