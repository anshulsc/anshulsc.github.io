<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 350" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 10 5 L 0 8 z" fill="#6e46be" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .state-box { fill: #ffffff; stroke: #e0e0e0; stroke-width: 2; rx: 12px; filter: url(#shadow); }
    .accent-box { fill: #fcfaff; stroke: #6e46be; stroke-width: 2.5; rx: 12px; filter: url(#shadow); }
    .text-title { font-family: 'Inter', system-ui, sans-serif; font-size: 15px; font-weight: 600; fill: #111111; }
    .text-body { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; fill: #555555; }
    .text-trans { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #6e46be; font-weight: 500; }
    .trans-line { fill: none; stroke: #6e46be; stroke-width: 1.5; marker-end: url(#arrow); }
    .self-loop { fill: none; stroke: #888888; stroke-width: 1.5; marker-end: url(#arrow); }
  </style>

  <!-- State Boxes -->
  <!-- HIGH State -->
  <rect x="50" y="100" width="160" height="100" class="accent-box" />
  <text x="130" y="140" text-anchor="middle" class="text-title">HIGH</text>
  <text x="130" y="170" text-anchor="middle" class="text-body">Battery Level: High</text>

  <!-- LOW State -->
  <rect x="440" y="100" width="160" height="100" class="state-box" />
  <text x="520" y="140" text-anchor="middle" class="text-title">LOW</text>
  <text x="520" y="170" text-anchor="middle" class="text-body">Battery Level: Low</text>

  <!-- Transitions -->
  <!-- 1. Search from High: loops back to High (alpha) -->
  <path d="M 90 100 Q 130 30 170 100" class="trans-line" />
  <text x="130" y="45" text-anchor="middle" class="text-trans">Search (prob α, r_search)</text>

  <!-- 2. Search from High: goes to Low (1-alpha) -->
  <path d="M 210 130 L 430 130" class="trans-line" />
  <text x="320" y="120" text-anchor="middle" class="text-trans">Search (prob 1-α, r_search)</text>

  <!-- 3. Wait from High: loops back to High (prob 1) -->
  <path d="M 50 130 A 30 30 0 1 0 50 170" class="self-loop" />
  <text x="10" y="185" text-anchor="start" class="text-body">Wait (1, r_wait)</text>

  <!-- 4. Wait from Low: loops back to Low (prob 1) -->
  <path d="M 600 130 A 30 30 0 1 1 600 170" class="self-loop" />
  <text x="610" y="185" text-anchor="end" class="text-body">Wait (1, r_wait)</text>

  <!-- 5. Recharge from Low: goes to High (prob 1) -->
  <path d="M 440 170 L 220 170" class="trans-line" />
  <text x="320" y="190" text-anchor="middle" class="text-trans">Recharge (prob 1, r=0)</text>

  <!-- 6. Search from Low: loops back to Low (prob beta) -->
  <path d="M 480 100 Q 520 30 560 100" class="trans-line" />
  <text x="520" y="45" text-anchor="middle" class="text-trans">Search (prob β, r_search)</text>

  <!-- 7. Search from Low: goes to High (Rescue, prob 1-beta) -->
  <path d="M 460 200 Q 320 280 180 200" class="trans-line" stroke-dasharray="3,3" />
  <text x="320" y="270" text-anchor="middle" class="text-trans" fill="#d97706">Search (prob 1-β, r=-3, Rescue)</text>
</svg>
