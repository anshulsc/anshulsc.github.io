<svg xmlns="http://www.w3.org/2000/svg" viewBox="-80 0 680 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .cell { fill: #ffffff; stroke: #e0e0e0; stroke-width: 1.5; rx: 8px; filter: url(#shadow); }
    .cell-accent { fill: #fcfaff; stroke: #6e46be; stroke-width: 2.5; rx: 8px; filter: url(#shadow); }
    .text-title { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 600; fill: #111111; }
    .text-body { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #555555; }
    .text-header { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 600; fill: #666666; }
    .axis-line { stroke: #cccccc; stroke-width: 1.5; }
  </style>

  <!-- Headers (Top Axes) -->
  <text x="165" y="40" text-anchor="middle" class="text-header">No Bootstrapping (Full Return)</text>
  <text x="440" y="40" text-anchor="middle" class="text-header">Bootstrapping (Estimate Future)</text>
  
  <!-- Left Axis Labels (Smaller & shifted to fit within viewBox margin) -->
  <text x="-10" y="125" text-anchor="end" class="text-header" style="font-size: 11px;">No Sampling</text>
  <text x="-10" y="141" text-anchor="end" class="text-body" style="font-size: 9px; fill: #666;">(Exact Expectation)</text>

  <text x="-10" y="245" text-anchor="end" class="text-header" style="font-size: 11px;">Sampling</text>
  <text x="-10" y="261" text-anchor="end" class="text-body" style="font-size: 9px; fill: #666;">(Model-Free/Experience)</text>

  <!-- Grid Lines -->
  <line x1="10" y1="60" x2="550" y2="60" class="axis-line" />
  <line x1="10" y1="60" x2="10" y2="310" class="axis-line" />
  <line x1="320" y1="60" x2="320" y2="310" class="axis-line" stroke-dasharray="3,3" />
  <line x1="10" y1="185" x2="550" y2="185" class="axis-line" stroke-dasharray="3,3" />

  <!-- Quadrants -->
  <!-- Top Left: empty -->
  <rect x="50" y="80" width="230" height="90" class="cell" />
  <text x="165" y="125" text-anchor="middle" class="text-body" fill="#999">N/A (Analytic returns</text>
  <text x="165" y="145" text-anchor="middle" class="text-body" fill="#999">without model - impossible)</text>

  <!-- Top Right: DP -->
  <rect x="340" y="80" width="200" height="90" class="cell" />
  <text x="440" y="120" text-anchor="middle" class="text-title">Dynamic Programming</text>
  <text x="440" y="145" text-anchor="middle" class="text-body">Uses exact model, updates via expectation</text>

  <!-- Bottom Left: MC -->
  <rect x="50" y="200" width="230" height="90" class="cell" />
  <text x="165" y="240" text-anchor="middle" class="text-title">Monte Carlo</text>
  <text x="165" y="265" text-anchor="middle" class="text-body">Learns from experience, waits for episode end</text>

  <!-- Bottom Right: TD (Accent) -->
  <rect x="340" y="200" width="200" height="90" class="cell-accent" />
  <text x="440" y="240" text-anchor="middle" class="text-title" fill="#6e46be">Temporal Difference</text>
  <text x="440" y="265" text-anchor="middle" class="text-body" fill="#555">Model-free learning, updates step-by-step</text>
</svg>
