<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .grid-line { stroke: #dddddd; stroke-width: 1; }
    .grid-border { stroke: #999999; stroke-width: 1.5; fill: none; }
    .cliff-rect { fill: #ffebeb; stroke: #ffcccc; stroke-width: 1; }
    .start-rect { fill: #e8f5e9; stroke: #c8e6c9; stroke-width: 1; }
    .goal-rect { fill: #e8f0fe; stroke: #d2e3fc; stroke-width: 1; }
    .text-cell { font-family: 'Inter', system-ui, sans-serif; font-size: 13px; font-weight: 600; fill: #333333; }
    .text-title { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; font-weight: 600; }
    .path-sarsa { fill: none; stroke: #3b82f6; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    .path-q { fill: none; stroke: #ef4444; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    .legend-text { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #555555; }
  </style>

  <!-- Grid Cells background -->
  <!-- Cliff (Bottom middle 10 cells) -->
  <rect x="80" y="160" width="400" height="40" class="cliff-rect" />
  
  <!-- Start & Goal -->
  <rect x="40" y="160" width="40" height="40" class="start-rect" />
  <rect x="480" y="160" width="40" height="40" class="goal-rect" />

  <!-- Grid Lines -->
  <!-- Horizontal -->
  <line x1="40" y1="40" x2="520" y2="40" class="grid-line" />
  <line x1="40" y1="80" x2="520" y2="80" class="grid-line" />
  <line x1="40" y1="120" x2="520" y2="120" class="grid-line" />
  <line x1="40" y1="160" x2="520" y2="160" class="grid-line" />
  <line x1="40" y1="200" x2="520" y2="200" class="grid-line" />
  <!-- Vertical -->
  <line x1="40" y1="40" x2="40" y2="200" class="grid-line" />
  <line x1="80" y1="40" x2="80" y2="200" class="grid-line" />
  <line x1="120" y1="40" x2="120" y2="200" class="grid-line" />
  <line x1="160" y1="40" x2="160" y2="200" class="grid-line" />
  <line x1="200" y1="40" x2="200" y2="200" class="grid-line" />
  <line x1="240" y1="40" x2="240" y2="200" class="grid-line" />
  <line x1="280" y1="40" x2="280" y2="200" class="grid-line" />
  <line x1="320" y1="40" x2="320" y2="200" class="grid-line" />
  <line x1="360" y1="40" x2="360" y2="200" class="grid-line" />
  <line x1="400" y1="40" x2="400" y2="200" class="grid-line" />
  <line x1="440" y1="40" x2="440" y2="200" class="grid-line" />
  <line x1="480" y1="40" x2="480" y2="200" class="grid-line" />
  <line x1="520" y1="40" x2="520" y2="200" class="grid-line" />

  <!-- Labels in start/goal/cliff -->
  <text x="60" y="185" text-anchor="middle" class="text-cell" fill="#2e7d32">S</text>
  <text x="500" y="185" text-anchor="middle" class="text-cell" fill="#1a73e8">G</text>
  <text x="280" y="185" text-anchor="middle" class="text-cell" fill="#c62828" font-size="11px">CLIFF (r = -100)</text>

  <!-- Paths -->
  <!-- Q-Learning Path (Optimal but dangerous, right next to cliff edge) -->
  <path d="M 60 180 L 60 140 L 500 140 L 500 180" class="path-q" />
  
  <!-- SARSA Path (Safe, one row up to avoid accidental steps into the cliff) -->
  <path d="M 60 180 L 60 100 L 500 100 L 500 180" class="path-sarsa" />

  <!-- Legend -->
  <rect x="130" y="215" width="12" height="12" fill="#ef4444" rx="2" />
  <text x="150" y="225" class="legend-text" font-weight="600">Q-Learning: Optimal Path (Dangerous)</text>

  <rect x="350" y="215" width="12" height="12" fill="#3b82f6" rx="2" />
  <text x="370" y="225" class="legend-text" font-weight="600">SARSA: Safe Path (Avoids Cliff edge)</text>
</svg>
