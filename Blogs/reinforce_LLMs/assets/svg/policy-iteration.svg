<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 10 5 L 0 8 z" fill="#6e46be" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .node { fill: #ffffff; stroke: #e0e0e0; stroke-width: 2; rx: 8px; filter: url(#shadow); }
    .accent-node { fill: #fcfaff; stroke: #6e46be; stroke-width: 2.5; rx: 8px; filter: url(#shadow); }
    .text-title { font-family: 'Inter', system-ui, sans-serif; font-size: 14px; font-weight: 600; fill: #111111; }
    .text-body { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #666666; }
    .text-accent { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; font-weight: 600; fill: #6e46be; }
    .arrow-line { fill: none; stroke: #6e46be; stroke-width: 2; marker-end: url(#arrow); }
  </style>

  <!-- Evaluation Node -->
  <rect x="50" y="80" width="160" height="80" class="accent-node" />
  <text x="130" y="115" text-anchor="middle" class="text-title">Policy Evaluation</text>
  <text x="130" y="135" text-anchor="middle" class="text-body">Compute V ≈ v_π</text>

  <!-- Improvement Node -->
  <rect x="290" y="80" width="160" height="80" class="node" />
  <text x="370" y="115" text-anchor="middle" class="text-title">Policy Improvement</text>
  <text x="370" y="135" text-anchor="middle" class="text-body">Greedy: π' = argmax Q</text>

  <!-- Forward Arrow (Top) -->
  <path d="M 210 100 Q 250 80 290 100" class="arrow-line" />
  <text x="250" y="75" text-anchor="middle" class="text-accent">Value V</text>

  <!-- Backward Arrow (Bottom) -->
  <path d="M 290 140 Q 250 160 210 140" class="arrow-line" />
  <text x="250" y="175" text-anchor="middle" class="text-accent">New Policy π'</text>

  <!-- Center text loop -->
  <text x="250" y="220" text-anchor="middle" class="text-title" font-size="15px">Guaranteed Convergence to Optimal</text>
  <text x="250" y="245" text-anchor="middle" class="text-body">π₀ → v_π₀ → π₁ → v_π₁ → ... → π* → v*</text>
</svg>
