<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <!-- Definitions for arrows and filters -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#6e46be" />
    </marker>
    <filter id="drop-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <style>
    .box { fill: #ffffff; stroke: #e0e0e0; stroke-width: 1.5; filter: url(#drop-shadow); rx: 12px; }
    .accent-box { fill: #fcfaff; stroke: #6e46be; stroke-width: 2; filter: url(#drop-shadow); rx: 12px; }
    .text-title { font-family: 'Inter', system-ui, sans-serif; font-size: 16px; font-weight: 600; fill: #111111; }
    .text-body { font-family: 'Inter', system-ui, sans-serif; font-size: 13px; fill: #555555; }
    .text-accent { font-family: 'Inter', system-ui, sans-serif; font-size: 14px; font-weight: 600; fill: #6e46be; }
    .arrow-line { fill: none; stroke: #6e46be; stroke-width: 2; marker-end: url(#arrow); }
  </style>

  <!-- Agent Box -->
  <rect x="50" y="100" width="160" height="120" class="accent-box" />
  <text x="130" y="140" text-anchor="middle" class="text-title">Agent</text>
  <text x="130" y="170" text-anchor="middle" class="text-body">Takes actions</text>
  <text x="130" y="190" text-anchor="middle" class="text-body">under policy π(a|s)</text>

  <!-- Environment Box -->
  <rect x="390" y="100" width="160" height="120" class="box" />
  <text x="470" y="140" text-anchor="middle" class="text-title">Environment</text>
  <text x="470" y="170" text-anchor="middle" class="text-body">State transitions</text>
  <text x="470" y="190" text-anchor="middle" class="text-body">p(s', r | s, a)</text>

  <!-- Action Arrow (Top path) -->
  <path d="M 210 135 L 300 135 Q 350 135 350 160 Q 350 160 380 160" class="arrow-line" />
  <text x="300" y="120" text-anchor="middle" class="text-accent">Action (Aₜ)</text>

  <!-- Reward Arrow (Bottom path, lower) -->
  <path d="M 390 190 Q 330 190 300 230 Q 270 270 210 270" class="arrow-line" stroke-dasharray="4,4" />
  <text x="300" y="275" text-anchor="middle" class="text-accent">Reward (Rₜ₊₁)</text>

  <!-- State Arrow (Bottom path, upper) -->
  <path d="M 390 170 L 300 170 Q 250 170 250 200 Q 250 200 210 200" class="arrow-line" />
  <text x="300" y="160" text-anchor="middle" class="text-accent">State (Sₜ₊₁)</text>
</svg>
