<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 10 5 L 0 8 z" fill="#6e46be" />
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .node { fill: #ffffff; stroke: #b5b5b5; stroke-width: 1.5; rx: 8px; filter: url(#shadow); }
    .node-accent { fill: #fcfaff; stroke: #6e46be; stroke-width: 2.5; rx: 8px; filter: url(#shadow); }
    .text-title { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 600; fill: #111111; }
    .text-body { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #555555; }
    .line { fill: none; stroke: #6e46be; stroke-width: 1.5; marker-end: url(#arrow); }
    .line-dash { fill: none; stroke: #888888; stroke-width: 1.2; stroke-dasharray: 4,4; marker-end: url(#arrow); }
    .group-label { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 700; fill: #777777; text-transform: uppercase; letter-spacing: 0.1em; }
  </style>

  <!-- Group Boxes (Visual groupings) -->
  <!-- Classical RL -->
  <rect x="20" y="20" width="460" height="400" fill="none" stroke="#e5e5e5" stroke-width="2" stroke-dasharray="5,5" rx="10" />
  <text x="35" y="45" class="group-label">Classical Foundations</text>

  <!-- Deep RL & LLMs -->
  <rect x="500" y="20" width="280" height="400" fill="none" stroke="#e5e5e5" stroke-width="2" stroke-dasharray="5,5" rx="10" />
  <text x="515" y="45" class="group-label">Deep RL &amp; LLM Alignment</text>

  <!-- Nodes (Chapter Nodes) -->
  <!-- Ch 1: The RL Problem -->
  <rect x="50" y="80" width="180" height="75" class="node" />
  <text x="140" y="112" text-anchor="middle" class="text-title">Ch 1: The RL Problem</text>
  <text x="140" y="132" text-anchor="middle" class="text-body">Trial &amp; Error, Value Functions</text>

  <!-- Ch 2: Bandits -->
  <rect x="50" y="200" width="180" height="75" class="node" />
  <text x="140" y="232" text-anchor="middle" class="text-title">Ch 2: Bandits</text>
  <text x="140" y="252" text-anchor="middle" class="text-body">Exploration dilemma, ε-greedy</text>

  <!-- Ch 3: MDPs & Bellman -->
  <rect x="280" y="80" width="180" height="75" class="node-accent" />
  <text x="370" y="112" text-anchor="middle" class="text-title">Ch 3: MDPs &amp; Bellman</text>
  <text x="370" y="132" text-anchor="middle" class="text-body">Formal Mathematical framework</text>

  <!-- Ch 4: Dynamic Programming -->
  <rect x="280" y="200" width="180" height="75" class="node" />
  <text x="370" y="232" text-anchor="middle" class="text-title">Ch 4: DP (Model-based)</text>
  <text x="370" y="252" text-anchor="middle" class="text-body">Policy &amp; Value Iteration</text>

  <!-- Ch 5: MC & TD Control -->
  <rect x="165" y="315" width="200" height="75" class="node" />
  <text x="265" y="347" text-anchor="middle" class="text-title">Ch 5: MC, TD &amp; Approx</text>
  <text x="265" y="367" text-anchor="middle" class="text-body">Q-Learning, Deep RL scaling</text>

  <!-- Ch 6: Policy Gradients -->
  <rect x="540" y="120" width="200" height="85" class="node-accent" />
  <text x="640" y="152" text-anchor="middle" class="text-title">Ch 6: Policy Gradients</text>
  <text x="640" y="172" text-anchor="middle" class="text-body">REINFORCE, Actor-Critic,</text>
  <text x="640" y="188" text-anchor="middle" class="text-body">GAE, PPO Clipping</text>

  <!-- Ch 7: RL Meets LLMs -->
  <rect x="540" y="260" width="200" height="85" class="node-accent" />
  <text x="640" y="292" text-anchor="middle" class="text-title">Ch 7: RL Meets LLMs</text>
  <text x="640" y="312" text-anchor="middle" class="text-body">RLHF, Bradley-Terry,</text>
  <text x="640" y="328" text-anchor="middle" class="text-body">GRPO, Reasoning (DeepSeek-R1)</text>

  <!-- Connections -->
  <!-- Ch 1 -> Ch 3 -->
  <path d="M 230 117 L 280 117" class="line" />
  <!-- Ch 1 -> Ch 2 (exploration dilemma link) -->
  <path d="M 140 155 L 140 200" class="line-dash" />
  <!-- Ch 3 -> Ch 4 -->
  <path d="M 370 155 L 370 200" class="line" />
  <!-- Ch 4 -> Ch 5 -->
  <path d="M 370 275 L 370 295 L 265 295 L 265 315" class="line" />
  <!-- Ch 3 -> Ch 5 (model free need) -->
  <path d="M 460 117 Q 480 117 480 295 L 265 295 L 265 315" class="line-dash" />
  
  <!-- Ch 5 -> Ch 6 -->
  <path d="M 365 352 L 510 352 L 510 162 L 540 162" class="line" />
  
  <!-- Ch 6 -> Ch 7 -->
  <path d="M 640 205 L 640 260" class="line" />
</svg>
